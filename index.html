<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1f35" />
    <title>AMACOS | Adeleke University</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path saved by 404.html after a hard refresh on a deep route
      (function () {
        var r = sessionStorage.getItem('__spa_redirect');
        if (r) {
          sessionStorage.removeItem('__spa_redirect');
          var path = r.replace(/~/, '?').replace(/%7E/, '?');
          window.history.replaceState(null, null, '/' + path);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
